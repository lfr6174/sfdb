repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Recommended to periodically update the Ruff version here
    rev: v0.15.2
    hooks:
      # Run linter and autofix errors (e.g., remove unused imports, sort imports)
      - id: ruff
        args: [ --fix ]
      # Run formatter (similar to Black)
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace  # Remove trailing whitespace
      - id: end-of-file-fixer    # Ensure file ends with a newline
      - id: check-yaml           # Check YAML syntax
      - id: check-added-large-files # Prevent accidentally committing large files
